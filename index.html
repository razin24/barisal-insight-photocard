<!DOCTYPE html>
<html lang="bn" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="বরিশাল ইনসাইড — ফটোকার্ড জেনারেটর" />
  <title>বরিশাল ইনসাইড | ফটোকার্ড জেনারেটর</title>

  <!-- Google Fonts -->
   <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- html2canvas for download -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ===== EDITOR PANEL ===== -->
<aside class="editor">
  <div class="editor-header">
    <div class="brand">
      <div class="brand-dot"></div>
      <span>বরিশাল ইনসাইড</span>
    </div>
    <p class="brand-sub">ফটোকার্ড জেনারেটর</p>
  </div>

  <!-- Theme Selector -->
  <div class="field-group">
    <label class="field-label">থিম বেছে নিন</label>
    <div class="theme-grid">
      <button class="theme-btn active" data-theme="white" title="ক্লিন হোয়াইট">
        <span class="theme-preview white-prev"></span>
        <span>হোয়াইট</span>
      </button>
      <button class="theme-btn" data-theme="dark" title="ডার্ক">
        <span class="theme-preview dark-prev"></span>
        <span>ডার্ক</span>
      </button>
      <button class="theme-btn" data-theme="light" title="মডার্ন লাইট">
        <span class="theme-preview light-prev"></span>
        <span>লাইট</span>
      </button>
    </div>
  </div>

  <!-- Category -->
  <div class="field-group">
    <label class="field-label" for="category">বিভাগ</label>
    <select id="category" class="field-input">
      <option value="বিশেষ প্রতিবেদন">বিশেষ প্রতিবেদন</option>
      <option value="রাজনীতি">রাজনীতি</option>
      <option value="অর্থনীতি">অর্থনীতি</option>
      <option value="বিনোদন">বিনোদন</option>
      <option value="খেলাধুলা">খেলাধুলা</option>
      <option value="আন্তর্জাতিক">আন্তর্জাতিক</option>
      <option value="শিক্ষা">শিক্ষা</option>
      <option value="স্বাস্থ্য">স্বাস্থ্য</option>
    </select>
  </div>

  <!-- Date -->
  <div class="field-group">
    <label class="field-label" for="date-input">তারিখ</label>
    <input type="text" id="date-input" class="field-input" placeholder="যেমন: ৫ মে ২০২৬" />
  </div>

  <!-- Headline -->
  <div class="field-group">
    <label class="field-label" for="headline">হেডলাইন</label>
    <textarea id="headline" class="field-input" rows="3" placeholder="মূল শিরোনাম লিখুন..." maxlength="73"></textarea>
  </div>

  <!-- Subheadline -->
  <div class="field-group">
    <label class="field-label" for="subheadline">সাব-হেডলাইন</label>
    <textarea id="subheadline" class="field-input" rows="2" placeholder="সংক্ষিপ্ত বিবরণ লিখুন..." maxlength="300"></textarea>
  </div>

  <!-- Photo Upload -->
  <div class="field-group">
    <label class="field-label">নিউজ ফটো</label>
    <label class="upload-area" for="photo-upload">
      <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
      </svg>
      <span id="upload-text">ছবি আপলোড করুন</span>
      <small>PNG, JPG, WEBP</small>
      <input type="file" id="photo-upload" accept="image/*" hidden />
    </label>
  </div>

  <!-- Caption -->
  <div class="field-group">
    <label class="field-label" for="caption">ছবির ক্যাপশন</label>
    <input type="text" id="caption" class="field-input" placeholder="যেমন: ছবি: সংগৃহীত" />
  </div>

  <!-- Download -->
  <button class="download-btn" id="download-btn">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
    </svg>
    ফটোকার্ড ডাউনলোড করুন
  </button>

  <p class="editor-footer">Barisal Inside Photocard Generator<br/>Open Source — MIT License</p>
</aside>

<!-- ===== PREVIEW AREA ===== -->
<main class="preview-area">
  <div class="preview-label">প্রিভিউ (1080 × 1350px)</div>

  <div class="card-scaler">
    <!-- ===== CARD ===== -->
    <div class="card theme-white" id="photocard">
      
      <!-- এটি নতুন যোগ করা হয়েছে -->
      <div class="corner-accent"></div>

      <!-- TOP BAR -->
      <div class="card-top">
        <div class="card-logo">
          <img src="logo.jpg" alt="Barishal Insight" class="custom-logo">
        </div>
        <div class="card-meta">
          <span class="card-category" id="preview-category">বিশেষ প্রতিবেদন</span>
          <span class="card-date" id="preview-date">৫ মে ২০২৬</span>
        </div>
      </div>

      <!-- DIVIDER -->
      <div class="card-divider"></div>

      <!-- PHOTO -->
      <div class="card-photo-wrap">
        <div class="card-photo" id="card-photo">
          <div class="photo-placeholder">
            <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24" opacity="0.3">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="m21 15-5-5L5 21"/>
            </svg>
            <span>ছবি আপলোড করুন</span>
          </div>
        </div>
        <div class="card-caption" id="preview-caption">ছবি: সংগৃহীত</div>
      </div>

      <!-- CONTENT -->
      <div class="card-content">
        <div class="content-accent"></div>
        <h1 class="card-headline" id="preview-headline">
          এখানে মূল হেডলাইন লিখুন
        </h1>
        <p class="card-sub" id="preview-sub">
          এখানে সাব-হেডলাইন বা সংক্ষিপ্ত বিবরণ লিখুন
        </p>
      </div>

      <!-- BOTTOM -->
      <div class="card-bottom">
        <span class="card-site">barishalinsight.blogspot.com</span>
        <div class="card-bottom-right">
          <div class="card-dot"></div>
          <div class="card-dot"></div>
          <div class="card-dot active"></div>
        </div>
      </div>

    </div><!-- /card -->
  </div><!-- /scaler -->
</main>

<script src="js/app.js"></script>
</body>
</html>
